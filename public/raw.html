<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZEOX - Raw Content</title>
    <style>
        body {
            background: #0f172a;
            color: #f8fafc;
            font-family: 'JetBrains Mono', monospace;
            padding: 20px;
            margin: 0;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .loading { color: #64748b; }
        .error { color: #f87171; }
    </style>
</head>
<body>
    <div id="content" class="loading">Loading raw content...</div>

    <script type="module">
        // Since this is a demo, we will simulate fetching the content.
        // In a real app, you would fetch this from Firebase Realtime Database or Firestore.
        
        const path = window.location.pathname;
        const fileId = path.split('/').pop();

        async function loadRawContent() {
            const contentEl = document.getElementById('content');
            
            // For now, we'll show a placeholder message.
            // You should implement your database fetch logic here.
            setTimeout(() => {
                contentEl.classList.remove('loading');
                contentEl.textContent = `-- ZEOX Raw Content (${fileId})\n-- This is a simulated raw output.\n-- In your production site, fetch the actual code from Firebase here.\n\nprint("Hello from ZEOX Raw Link!")`;
            }, 800);
        }

        loadRawContent();
    </script>
</body>
</html>
