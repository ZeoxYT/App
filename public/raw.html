<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZEOX - Raw Content</title>
    <style>
        body {
            background: #0f172a;
            color: #f8fafc;
            font-family: 'JetBrains Mono', monospace;
            padding: 20px;
            margin: 0;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .loading { color: #64748b; }
        .error { color: #f87171; }
        #meta {
            font-size: 11px;
            color: #64748b;
            margin-bottom: 16px;
            border-bottom: 1px solid #1e293b;
            padding-bottom: 12px;
        }
    </style>
</head>
<body>
    <div id="meta" class="loading">Loading file info...</div>
    <div id="content" class="loading">Loading raw content...</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyCg41nrI9GosXvb_5vuOixSDpbzeYuct20",
          authDomain: "zeoxxyz.firebaseapp.com",
          databaseURL: "https://zeoxxyz-default-rtdb.firebaseio.com",
          projectId: "zeoxxyz",
          storageBucket: "zeoxxyz.firebasestorage.app",
          messagingSenderId: "896346061745",
          appId: "1:896346061745:web:d1fde2af1ee3eef26ddb90",
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Extract file ID from URL: /raw/<fileId>
        const pathParts = window.location.pathname.split('/');
        const fileId = pathParts[pathParts.length - 1] || pathParts[pathParts.length - 2];

        const metaEl   = document.getElementById('meta');
        const contentEl = document.getElementById('content');

        async function loadRawContent() {
            if (!fileId) {
                metaEl.className = 'error';
                metaEl.textContent = 'Error: No file ID in URL.';
                contentEl.textContent = '';
                return;
            }

            try {
                const docRef = doc(db, 'publishedFiles', fileId);
                const snap   = await getDoc(docRef);

                if (!snap.exists()) {
                    metaEl.className = 'error';
                    metaEl.textContent = `File not found (ID: ${fileId})`;
                    contentEl.textContent = '';
                    return;
                }

                const data = snap.data();
                metaEl.className = '';
                metaEl.innerHTML = `-- ZEOX Published File --\n-- Name: ${data.name}\n-- Size: ${(data.size / 1024).toFixed(1)} KB\n-- ID:   ${fileId}`;

                // Decode base64 -> encrypted bytes -> XOR decrypt -> text
                const encBinary = atob(data.content);
                const encBytes  = Uint8Array.from(encBinary, c => c.charCodeAt(0));
                const decBytes  = encBytes.map(b => b ^ 0x5A); // XOR key 'Z'
                const text      = new TextDecoder().decode(decBytes);

                contentEl.className = '';
                contentEl.textContent = text;

            } catch (err) {
                metaEl.className = 'error';
                metaEl.textContent = 'Error loading file: ' + err.message;
                contentEl.textContent = '';
            }
        }

        loadRawContent();
    </script>
</body>
</html>
